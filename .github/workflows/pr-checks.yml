# PR Checks
#
# Runs structural validation on pull requests and pushes to main.
# No secrets required — all checks are syntactic/structural.

name: "PR Checks"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-validation:
    name: Workflow & engine-config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Validate engine-config.py syntax
        run: python3 -c "import ast; ast.parse(open('.github/scripts/engine-config.py').read())"

      - name: Validate engine-config.py outputs for all engines
        run: |
          unset GITHUB_OUTPUT
          for engine in claude copilot codex; do
            echo "--- Testing engine: $engine ---"
            output=$(python3 .github/scripts/engine-config.py --engine "$engine")
            echo "$output" | grep -q "^engine_id=$engine" || { echo "FAIL: missing engine_id for $engine"; exit 1; }
            for key in engine_name secret_name concurrency_prefix install_cmd; do
              echo "$output" | grep -qE "^${key}=|^${key}<<" || { echo "FAIL: missing $key for $engine"; exit 1; }
            done
            echo "  PASS: $engine"
          done

      - name: Validate workflow YAML syntax
        run: pip install -q pyyaml && python3 -c "import yaml; yaml.safe_load(open('.github/workflows/fitness-review.yml'))"

  workflow-tests:
    name: Workflow validation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run workflow tests (act tests skipped in CI)
        run: bash tests/workflow-tests.sh

  skill-structure:
    name: Skill structure validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run skill structure tests
        run: bash tests/skill-structure-tests.sh

  fitness-config:
    name: Fitness config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Validate fitness-config.example.json
        run: python3 scripts/fitness-config.py validate fitness-config.example.json

      - name: Validate fitness-config.py init
        run: |
          python3 scripts/fitness-config.py init /tmp/fitness-config-test.json
          python3 scripts/fitness-config.py validate /tmp/fitness-config-test.json

  engine-config-unit-tests:
    name: Engine config unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Run engine-config unit tests
        run: python3 -m unittest tests/test_engine_config.py -v
        